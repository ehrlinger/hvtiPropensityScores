url: https://ehrlinger.github.io/hvtiPropensityScores/
template:
  bootstrap: 5
  bslib:
    bootswatch: zephyr
    base_font: {google: "Outfit"}
    code_font: {google: "Fira Code"}
  light-switch: true
  theme: atom-one-light
  theme-dark: atom-one-dark

home:
  sidebar:
    structure: [badges, links, authors]
    components:
      badges:
        title: Package badges
        text: |
          ![](https://img.shields.io/github/r-package/v/ehrlinger/hvtiPropensityScores)<br>
          ![](https://img.shields.io/github/actions/workflow/status/ehrlinger/hvtiPropensityScores/pkgdown.yaml)<br>

navbar:
  structure:
    left:  [intro, articles, reference, news]
    right: [search, github, my_linkedin, lightswitch]
  components:
    my_linkedin:
      icon: fa-linkedin
      href: https://www.linkedin.com/in/ehrlinger/
      aria-label: LinkedIn

articles:
- title: "Get started"
  navbar: ~
  contents:
  - hvtiPropensityScores

reference:
- title: "Package Overview"
  desc: >
    Package-level documentation and the base S3 class shared by all
    hvtiPropensityScores data objects.
  contents:
  - hvtiPropensityScores-package
  - is_ps_data

- title: "Data"
  desc: >
    Synthetic datasets for examples and unit tests.
  contents:
  - sample_ps_data
  - sample_ps_data_ordinal
  - sample_ps_data_nominal
  - sample_ps_data_count

- title: "Propensity Score Estimation"
  desc: >
    Functions for estimating propensity scores and balancing scores from
    raw patient data. Supports binary, ordinal, nominal, continuous, and
    count outcomes, with optional multiple-imputation averaging.
  contents:
  - ps_logistic
  - ps_ordinal
  - ps_nominal
  - bs_continuous
  - bs_count

- title: "Propensity Score Methods"
  desc: >
    Functions for balancing treated and control groups via matching or
    inverse-probability-of-treatment weighting.
  contents:
  - ps_match
  - ps_weight

- title: "Sensitivity Analysis"
  desc: >
    Functions for assessing robustness of propensity score analyses to
    unmeasured confounding and model assumptions.
  contents:
  - sa_rosenbaum
  - sa_evalue
  - sa_overlap
  - sa_trim_sweep

- title: "Internal"
  desc: >
    S3 methods for printing and summarising ps_data objects.
  contents:
  - print.ps_data
  - summary.ps_data
